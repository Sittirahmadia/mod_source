name: Build HyperBoost V5

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:  # Bisa di-trigger manual dari GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mod_source

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version=8.8

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle & Fabric dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            mod_source/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('mod_source/**/*.gradle*', 'mod_source/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build mod
        run: ./gradlew build --no-daemon

      - name: Upload mod JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyperBoost-V5-mod
          path: mod_source/build/libs/*.jar
          if-no-files-found: error
          retention-days: 30
